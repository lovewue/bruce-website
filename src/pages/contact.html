<!-- title: Contact | Bruce Greenhalgh -->
<!-- description: Get in touch with Bruce Greenhalgh about therapy, mindfulness, supervision, retreats, or organisational support. -->

<main>
  <section class="contact-hero" style="background-image: url('images/contact-coastpath.png');">
    <p class="hero-tagline">Mindful Consultant Services</p>
    <div class="contact-form-card">
      <span class="corner-accent"></span>
      <h1>Contact</h1>
      <form class="contact-form" novalidate>
        <div class="form-row">
          <div class="form-field">
            <label for="first-name">First Name (required)</label>
            <input type="text" id="first-name" name="first-name" required>
          </div>
          <div class="form-field">
            <label for="last-name">Last Name (required)</label>
            <input type="text" id="last-name" name="last-name" required>
          </div>
        </div>
        <div class="form-field">
          <label for="email">Email Address (required)</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-field">
          <label for="message">Message / Enquiry (required)</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn">Submit</button>
        <p class="form-status" role="status" style="margin-top:1rem; color: var(--ink-muted);"></p>
      </form>
    </div>
  </section>
</main>
